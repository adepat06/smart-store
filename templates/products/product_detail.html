<!DOCTYPE html>
<html>
<head>

    <title>{{ product.name }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background: #f8f9fa;
        }

        .product-image {
            height: 500px;
            width: 100%;
            object-fit: cover;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <a href="/" class="btn btn-secondary mb-4">
        ← Back
    </a>

    <div class="card shadow-sm">

        <div class="row g-0">

            <div class="col-md-6">

                {% if product.image %}

                <img
                    src="{{ product.image }}"
                    class="product-image"
                    alt="{{ product.name }}"
                >

                {% endif %}

            </div>

            <div class="col-md-6">

                <div class="card-body p-5">

                    <h1>{{ product.name }}</h1>

                    <p class="text-muted fs-5">
                        {{ product.description }}
                    </p>

                    <h2 class="mb-4">
                        ₹{{ product.price }}
                    </h2>

                    <form
                        method="POST"
                        action="/cart/add/{{ product.id }}/"
                    >

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Quantity
                            </label>

                            <input
                                type="number"
                                name="quantity"
                                value="1"
                                min="1"
                                class="form-control"
                                style="width:120px;"
                            >

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success btn-lg"
                        >
                            Add To Cart
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
