<!DOCTYPE html>
<html>
<head>

    <title>My Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background: #f8f9fa;
        }

        .order-card {
            transition: 0.3s;
        }

        .order-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4">
        📦 My Orders
    </h1>

    {% for order in orders %}

    <div class="card order-card shadow-sm mb-4">

        <div class="card-body">

            <h4>
                Order #{{ order.id }}
            </h4>

            <p class="text-muted">
                {{ order.created_at }}
            </p>

            <h5>
                Total: ₹{{ order.total_price }}
            </h5>

        </div>

    </div>

    {% empty %}

    <div class="card shadow-sm">

        <div class="card-body">

            <p class="mb-0">
                No orders found.
            </p>

        </div>

    </div>

    {% endfor %}

</div>

</body>
</html>
