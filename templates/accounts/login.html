<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1>Login</h1>

    {% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            class="form-control mb-3"
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            class="form-control mb-3"
        >

        <button
            type="submit"
            class="btn btn-success"
        >
            Login
        </button>

    </form>

</div>

</body>
</html>
