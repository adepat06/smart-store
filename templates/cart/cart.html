<!DOCTYPE html>
<html>
<head>

    <title>Your Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background: #f8f9fa;
        }

        .cart-card {
            transition: 0.3s;
        }

        .cart-card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            height: 150px;
            object-fit: cover;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4">
        🛒 Your Cart
    </h1>

    {% for item in cart_items %}

    <div class="card cart-card shadow-sm mb-4">

        <div class="row g-0">

            <div class="col-md-3">

                {% if item.product.image %}

                <img
                    src="{{ item.product.image }}"
                    class="img-fluid h-100 product-image"
                    alt="{{ item.product.name }}"
                >

                {% endif %}

            </div>

            <div class="col-md-9">

                <div class="card-body">

                    <h3>{{ item.product.name }}</h3>

                    <p class="text-muted">
                        {{ item.product.description }}
                    </p>

                    <p>
                        Quantity: {{ item.quantity }}
                    </p>

                    <h5>
                        ₹{{ item.product.price }}
                    </h5>

                </div>

            </div>

        </div>

    </div>

    {% endfor %}

    <div class="card shadow-sm">

        <div class="card-body">

            <h2>
                Total: ₹{{ total }}
            </h2>

            <a href="/orders/checkout/"
               class="btn btn-success btn-lg mt-3">
                Checkout
            </a>

        </div>

    </div>

</div>

</body>
</html>
