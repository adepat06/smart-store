<!DOCTYPE html>
<html>
<head>

    <title>Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1>Your Cart</h1>

    <hr>

    {% for item in cart_items %}

        <h4>
            {{ item.product.name }}
        </h4>

        <p>
            Quantity:
            {{ item.quantity }}
        </p>

        <p>
            ₹{{ item.product.price }}
        </p>

        <hr>

    {% endfor %}

    <h3>
        Total: ₹{{ total }}
    </h3>

</div>

</body>
</html>
